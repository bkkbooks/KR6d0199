body:
  text: 宋東山沙門遵式始於天台國清集於四明大靁山蘭若再治敘緣起第一此文再治凡四因緣一者為國清始集之日正欲於靈墟自修既迫所期遽取成就其間事理文句錯雜廣略未允一往難曉依百録題請觀音懺法是也今之再治務本有在命用經題以異衆製及所治本二者為國清集多潤色之語並削去之悉用經疏止觀等言既援據有在俾後之人增長正信三者近得國清所集晚學狂簡於懺願文後更添法華懺文中四悔并音切梵字又見一本刪去諸儀及觀慧等文直寫佛位并懺願而已題云觀音禮文又一本應是耄年書寫全行脫落麁注不分却於行間私安注字意欲區別傷此等人好而不習輒便去取毀甘露門殃纍非淺今用再治為遠諸過四者盡取觀慧諸文安於事後令運念周備免使行人時有虛擲應知大乘三種懺悔必以理觀為主止觀云觀慧之本不可闕也輔行釋云若無觀慧乃成無益苦行故也禪波羅蜜云一切大乘經中明懺悔法悉以此觀為主若離此觀則不得名大乘方等懺也補助儀云夫禮懺法世雖同斆事儀運想多不周旋或粗讀懺文半不通利或推力前拒理觀一無斆精進之風闕入門之緒故言勤修苦行非涅槃因吾祖大醫明誡斯在上四意擬四悉檀敘因緣竟明正意第二請觀音疏依舊人約十意明方法一嚴淨道場二作禮三燒香散華四繫念數息五具楊枝淨水六請三寶七誦呪八披陳九禮拜十坐禪疏但釋經不暇細出方法故且依舊列而已百録既正明事儀其意少別舊家五具楊枝六始請聖百録依經請後楊枝舊家十坐禪百録移為誦經便將第四數息為禪舊坐則重而闕唱誦故今數雖十專依百録為準然此十意各具事理皆通感應俱遍三業悉淨三障咸會三德解脫要道一何坦然故約事即今十科事行約理惟二一順陀羅尼中道正觀二歷事修觀此之事理必藉三業三業成機理無不應應即業淨業淨即障除障除即會德會德即無事理亦無感應一切寂然誰論十意問嚴淨道場始能置辦通具事理可爾云何便論感應乃至會德答十意約別不無方便正修之異今約通論既許具事理何疑感應等耶況復凡云請聖皆約三義一標心二行三證且置辦道場觸類標心擬求何事三業行淨非時尚感況道場乎歷事觀理義同於證三請意足豈無應耶道場尚爾餘九可知更為引經通證十意感應等者經云汝今應當五體投地燒香散華繫念數息為衆生故當請彼佛及二菩薩説是語時佛及菩薩俱到此國此乃牟尼才示設請之法都未修行但云説此語時佛等早降自非三請之力安致於斯投地證二番作禮餘證請等三意又國人面授楊枝淨水此證道場及第六意三呪皆云現前見佛證誦呪意處處破障見佛文證披陳意得聞此經受持讀誦等即超越無量無數阿僧祇劫生死之罪證唱誦意十意整足感應炳然行者思之首尾十意既勞三業勿使唐喪常悲灑血韋提扣頭此亦今初二意感應之明證餘可例知云何凡置道場猥同俗務反招罪纍滅障良難此如輔行記所訶至於正修須心通廣遠事理明白自或未達當詢解者書云自用者小弗詢勿庸十意今當説第一莊嚴道場百録云當嚴飾道場香泥塗地懸諸幡蓋安置佛像南向觀音像別東向止觀云於淨處道場請彌陀像觀音勢至像安於西方道場正須安觀音像東向於觀音右肩安勢至於左肩南向安佛像當中更安釋迦無妨須莊嚴畢備然後安像設楊杖淨水若便利左右以灰塗身澡浴清淨著新淨衣百録云行者十人已還當西向席地地若卑濕置低腳床當日日盡力供養若不能辦初日不可無施輔行云雖身口精誠須假以福助日日為者彌為增上恐力不逮聽從初日必先課已資財利伸傾竭百録按大悲經三七日控此經七七日悉用齋日建首理觀者輔行云歷事修觀約尊容道具止觀云道場即清淨境界也治五住粳顯實相米亦是定慧用莊嚴法身也輔行云場是所嚴能嚴雖多不出定慧供養雖衆不出動與不動止觀云香泥者即無上尸羅也輔行云究竟戒香遍塗實理幡蓋者止觀云幡即翻也翻法界上迷生動出之解蓋者觀五陰免子縛起大慈悲覆法界也輔行云觀陰本空如免子縛無緣慈陰故遍法界又靜處者止觀云遠離二邊稱之為靜處者諦理是處也中道之法幽遠深𨗉故也彌陀像等疏云表如來法身實相之境觀音表中道正觀之智大勢表福德神力熏修西方者對五行西即是金主決斷剛直之義對四諦即是道諦道名能通用智慧見理故大智觀音能消伏毒害左右出入者左表定出是散以定止散故須左出右表權入表實即以權入實故須右入澡浴者止觀以修實觀蕩障淨智輔行云所除如惑能洗日觀身無垢故能所俱淨又助道如灰塗正觀如清水淨究身上垢也新淨衣者百録表寂滅忍覆二邊醜陋輔行云寂忍稱體如衣在身問便利何無觀解然但便利飲食非三昧行義所制故文無解若作觀何妨如華嚴淨行品文又便利時順經作想蕩除糞穢還得清淨餘文既非常制悉可隨意作觀但令順圓正助雅合法相向後備書第二作禮法百録云各執香爐一心一意向彼西方五體投地使明了音聲者唱輔行云五體投地理須雙膝前詣雙肘續施後方額扣肝膽委地想佛足下施手承足如對目前疏云大聖常欲濟拔為無瘡之者毒不能入故令三業為機理解者疏云地是一實相地若與薩婆若相應心合名為投地若離薩婆若而起五陰此是平倚毒害不消沈淪生死今明五體表五陰左腳是色右腳是受左手是行右手是想頭是識何故爾戒是色法無作冥密如陰表左腳也定是受者定是心神之法為陽表右腳也想是推晝前境如陽表右手也行是思數如陰表左手也五識在頭能了別故識對頭也若依薩婆若地者得五分法身戒是防護七支故是色陰定是三昧正受故是受陰慧是悟虛智即想陰解脫是行行能招纍解脫無纍故對行陰解脫知見是識陰能了別故以五分法身伐生死五陰經云因滅是色獲得常色受想行識亦復如是是以名五體投地令毒害消伏則出生死翛然纍表也一心頂禮本師釋迦牟尼世尊一心頂禮西方無量壽世尊一心頂禮過去七佛世尊一心頂禮十方一切諸佛世尊一心頂禮消伏毒害陀羅尼破惡業障陀羅尼六字章句陀羅尼一心頂禮十方一切尊法一心頂禮觀世音菩薩摩訶薩一心頂禮大勢至菩薩摩訶薩一心頂禮十方一切菩薩摩訶薩一心頂禮舍利弗等聲聞緣覺賢聖僧禮佛想云能禮所禮性空寂感應道交難思議我此道場如帝珠釋迦牟尼影現中我身影現釋迦前頭面接足歸命禮至禮無量壽佛即云無量壽佛影現中云云禮法想云真空法性如虛空常住法寶難思議我身影現法寶前莫不皆悉歸命禮禮僧準上禮佛作想但改為菩薩等惟禮觀音云為求滅障接足禮此是懺悔之主別須三禮表破三障及勤重故耳第三燒香散華止觀云燒香運念三業供養輔行云三業供養者身翹跪口宣唱意運想百録云禮竟燒香散華而作是言是諸衆等各各胡跪嚴持香華如法供養供養十方法界三寶至此捧香華想云願此香華遍十方以為微妙光明臺諸天音樂天寶香諸天肴膳天寶衣不可思議妙法塵一一塵出一切塵一一塵出一切法旋轉無礙互莊嚴遍至十方三寶前十方法界三寶前悉有我身修供養一一皆悉遍法界彼彼無雜無障礙盡未來際作佛事普熏法界諸衆生蒙熏皆發菩提心同入無生證佛智想已散華更執手爐口發誠言云願此香華雲遍滿十方界供養一切佛尊法諸菩薩無量聲聞衆以起光明臺過於無邊界無邊佛土中受用作佛事普熏諸衆生皆發菩提心起已一禮收坐具至坐禪處理解者疏云香即熏馨遮掩臭穢表智慧斷結香即智慧也亦名止善華能嚴飾表定定是福德莊嚴亦名行善復次華以表慧華是可見之法對慧是照了見理之義香以表定香以冥熏對定寂靜之義作此互對者通明慧中有定定中有慧別明各具定慧復次香對無作行善無作因作而發而須更作任運常起如燒香時用火為緣即便香煙任運遍滿華對作善不作善則不生如華以手散香若不運華則不散用此合十種行人明消伏意第四繫念數息百録云當向西方結跏趺坐繫念數息令心不散勿數風喘氣為衆生故經十念頃疏云十息為一念凡百息為十念禪波羅蜜云初至繩床令坐安穩若半加以左腳置右髀上牽來近身令腳指與左右髀齊若全加即上下右腳置左髀次左掌置右掌上頓置左髀近身當心而安正身端直令鼻與臍相對平面正住閉口脣齒才相拄著舉舌向齶閉眼才令斷外光而已息者有聲曰風結滯曰喘不結曰結不聲不結不麁不澀不滑出入綿綿若存若亡資神安隱曰息守風散喘滯氣勢息定百録云成十念已次念十方佛七佛世尊色身實相妙身猶如虛空又當慈念一切衆生作此念時如一上禪久運念已安詳徐覺疏云繫念是勸意業默念之請下根即得心定亂止中根即得細住上根即得未到地定此是喜發諸禪無漏見十方佛念佛三昧一切諸禪即此十念約十種行人數息域意不同若數息調適身心安靜四大調和即消伏果報上毒害若數息時開發善心惡業俱息具世善即人天數息若觀息是風氣風即色能觀心王是識領受此息緣想此息其餘是行息具五陰即四念處名聲聞息若觀息過去無明因緣成今果報之息三世因緣是緣覺息若觀息不保不著名檀不起不善名尸安耐此數名忍念念相續名進知數不亂名定照了風喘邪正是智成事六度息若觀息成無相慧名通教息若觀息不空不俗中道佛性前後觀之名別教息若圓觀此息一心三諦無次第前後名圓教息念佛者經文令念七佛等也輔行引婆沙云諸法本來無生無滅菩薩信樂色法二身如虛空故於一切處得無障礙言障礙者謂須彌山等是人未得天眼念他方佛得禪定法隨意見佛亦應細約十種行相疏云十方佛即十法界皆有佛性七佛七覺分也念生生者應緣四諦境起慈悲為便文繁不引可以意思應知繫念勿得輕心但為斂念而已須知行人根性不同於三七日若七七日深有所發故疏中廣約三根及十種行人明其相貌令旨趣在遠行者深思數息既爾諸門例然一一約十種行人明消伏意第五召請疏云請有三義一為自請二為他請三護正法請自請如斯那為他如月蓋護法如七言偈自請是攝善法戒為他是攝衆生戒護法是攝正法戒得意者三秖是一欲使自身戒定慧明淨即是攝善法以己利他即攝衆生心佛及衆生是三無差別今逐行者傍正或自為正餘為傍乃至護法亦爾自請復有三延請祈請願請為他護法亦此三也延即屈伸俯仰延致之義對身業如五體投地是也祈即發口干求即口業如四行偈是也願即要心處所即繫念是也然別對雖爾通則必具三業合行宜在得意今義當延請百録云令一人裝香火各各互跪召請輔行云互跪之儀三處翹聳曲身合掌目注金容近代澆醨都無跪相慢幢未折業海難傾尚縱穢軀安期大道視斯明誡切在勤拳請云一心奉請南無本師釋迦牟尼世尊三遍奉請前所禮三寶請佛想云我三業性如虛空釋迦如來亦如是不起真際為衆生與衆俱來受供養請法云法性如空不可見常住法寶難思議我今三業如法請唯願顯現受供養請僧同前請佛但改名字為異耳諸本懺法於奉請後説偈讚佛惟此懺無讚歎文今依三請觀音經録偈就刊于此大悲大名稱吉祥安樂人常説吉祥句救濟極苦者衆生若聞名離苦得解脫亦遊戲地獄大悲代受苦或處畜生中化作畜生形教以大智慧令發無上心或處阿修羅軟言調伏心令除憍慢習疾至無為岸現身作餓鬼手出香色乳飢渴逼切者施令得飽滿大慈大悲心遊戲於五道常以善習慧無上勝方便普教一切衆令離生死苦常得安樂處到大涅槃岸讚歎已隨意陳情第六具楊枝淨水經云爾時毗舍離人即具楊枝淨水授與觀世音菩薩止觀但云設楊枝等不言授與今依經令行人跪授唱云我今已具楊枝淨水唯願大悲哀憐攝受三説輔行事解云以觀音左手把楊枝右手持澡瓶是故請者須備二物疏云此是勸具要因正為機感也楊枝拂動以表慧淨水澄停以表定楊枝又二義一拂除對消義二拂打對伏義又拂除對消滅二折伏即對消除淨水亦二義一洗除對消義二醒悟對伏義又四義一洗二潤漬三醒悟四安樂洗對消滅之消潤對消除醒悟對降伏之伏安樂對平伏之伏又洗除對消伏毒害大悲拔苦是慧義潤漬是大慈與樂是定義醒悟是慧義安樂是定義約十種行人各作與拔等云云第七誦三呪行人先知云何呪義疏云呪名呪願如螟蛉法亦名呪術此術法盡與十種行人毒害相應密能消伏十種行人者分段有八一受苦人二修世善三修聲聞四修緣覺五修六度修道七修別八修圓變易有二別三十心人圓初住已上各有苦業愛見毒害具如疏釋又云此呪即實相正觀為體非空非有遮二邊惡業持中道正善具足三德不縱不橫諸佛祕要不可思議又云靈智寂照法身為體感應為宗救厄拔苦為用歷四教十法界消除三障當知此呪神用廣遠止觀云消伏毒害陀羅尼能破報障毗舍離人平復如本破惡業陀羅尼能破業障破梵行人蕩除糞穢令得清淨六字章句陀羅尼能破煩惱障淨於三毒根成佛道無疑疏以初呪破煩惱六字破報各有經證蓋三呪各能破於三障故互論皆得既略知梗概當自籌計於十種人中投心何位欲消何障欲期何事又消障應從重者對治重者若滅輕者隨去決起精進不得自疑三世諸佛真實法印豈虛也哉將欲誦呪先互跪合掌一心一意三稱三寶及觀世音名疏云三稱三寶表除三障應令衆聲起伏同時勿使喧亂惑心南無佛南無法南無僧南無觀世音菩薩摩訶薩大慈大名稱救護苦厄者三稱竟復唱云願救我苦厄大悲覆一切普放淨光明滅除癡暗瞑為免毒害苦煩惱及衆病必來至我所施我大安樂我今稽首禮聞名救厄者我今自歸依世間慈悲父唯願必定來免我三毒苦施我今世樂及與大涅槃三説然此四偈初二正請次二結集初中有二初偈總請次偈別請初偈又二初一句唯自請次三句通自他言苦厄者六根患也覆一切者通於十界也普放者請大智光除癡瞑也次別請別標三障也毒害苦業障也二障如文大樂即涅槃涅槃即三德三德破三障次二行結請如文慈悲父等義更須尋疏為善誦此四偈者為轉障之緣亦為入觀相應之本故須略識仍一一須約十種行人此下經文歎呪體用誦時作白佛想白佛言世尊如是神呪必定吉祥乃是過去現在未來十方諸佛大慈大悲陀羅尼印聞此呪者衆苦永盡常得安樂遠離八難得念佛定現前見佛我今當説十方諸佛救護衆生神呪多耶他嗚呼膩摸呼膩鬪婆膩耽婆膩安荼詈盤荼詈首埤帝般般荼囉囉婆私膩多絰他伊梨寐梨鞮首梨迦婆梨佉鞮端耆旃陀梨摩蹬耆勒叉勒叉薩婆薩埵薩婆婆耶啤娑訶多荼咃伽帝伽帝膩伽帝修留毗修留毗勒叉勒叉薩婆薩埵薩婆婆耶啤娑訶或三或七遍結經云白佛言世尊如此神呪乃是十方三世無量諸佛之所宣説誦持此呪者常為諸佛諸大菩薩之所護持免離怖畏刀杖毒害及與疾病令得無患説是語時毗舍離人平復如本起拜已復跪下去例然次誦破惡業障陀羅尼爾時世尊憐愍衆生覆護一切重請觀世音菩薩説消伏毒害呪爾時觀世音菩薩大悲熏心承佛神力而説破惡業消伏毒害陀羅尼呪南無佛陀南無達摩南無僧伽南無觀世音菩提薩埵摩訶薩埵大慈大悲唯願愍我救護苦惱亦救一切怖畏衆生令得大護怛絰他陀呼膩摸呼膩鬪婆膩耽婆膩阿婆熙摸呼脂分荼梨槃荼梨輸鞞帝般荼囉婆私膩休樓休樓分荼利兜樓兜樓般荼梨周樓周樓膩般荼梨豆富豆富般荼囉婆私膩矧墀躎墀膩躎墀薩婆阿婆耶羯多薩婆咺婆娑陀伽阿婆耶卑離陀閉殿娑訶一切怖畏一切毒害一切惡鬼虎狼師子聞此呪時口即閉塞不能為害破梵行人作十惡業聞此呪時蕩除糞穢還得清淨設有業障濁惡不善稱觀世音菩薩誦持此呪即破業障現前見佛次誦六字章句陀羅尼南無佛南無法南無僧南無釋迦牟尼佛南無觀世音菩薩摩訶薩我今當誦大吉祥六字章句救苦神呪多絰他安陀詈般陀詈枳由詈檀陀詈羶陀詈底耶婆陀耶賒婆陀頗羅膩祇毗質雌難多詈婆伽詈阿盧禰薄鳩詈摸鳩隸兜毗隸娑訶爾時世尊説是神呪已告阿難言若善男子善女人四部弟子得聞觀世音菩薩名號并受持讀誦六字章句若行曠野迷失道徑誦此呪故觀世音菩薩大悲熏心化為人像示其道路令得安隱乃至獲大善利消伏毒害今世後世不吉祥事永盡無餘持戒精進念定總持皆悉足具第八披陳懺悔呪竟當自憶念先罪起大怖畏未有惡業不招苦報禪門云行者思惟若戒不清淨決須懺悔是故經云佛法之中有二健兒一性不作惡二作已能悔今造過知悔名健人也夫懺名懺謝三寶及一切衆生悔名慚愧改過求哀我今此罪若得滅者於將來時寧失身命終不更犯如比丘白佛我寧抱是熾然大火終不敢毀犯淨戒此下語出法華三昧復憶無始所造乃至今生業性雖空果報不失顛倒因緣起諸重罪流淚悲泣口宣懺悔應心念言我及衆生無始常為三業六根重罪所障不見諸佛不知出要低順生死不知妙理我今雖知猶與衆生同為一切重罪所障今對觀音十方佛前普與衆生歸命懺悔唯願加護令障消滅念已唱云普為法界衆生悉願斷除三障歸命懺悔唱已五體投地心復念云我與衆生無始來今由愛見故內計我人外加惡友不隨喜他一毫之善唯遍三業廣造衆罪事雖不廣惡心遍布晝夜相續無有間斷覆覆過失不欲人知不畏惡道無慚無愧撥無因果故於今日深信因果生重慚愧生大怖畏發露懺悔斷相續心發菩提心斷惡修善勤策三業翻昔重過隨喜凡聖一毫之善念十方佛有大福慧能救拔我及諸衆生從二死海置三德岸從無始來不知諸法本性空寂廣造衆惡今知空寂為求菩提為衆生故廣修諸善遍斷衆惡唯願觀音慈悲攝受至心懺悔比丘某甲稽首歸命十方三世三寶本師釋迦牟尼佛等上所奉請諸佛賢聖大悲觀世音菩薩憐愍覆護受我奉請顯現道場受我懺悔比丘某甲等為法界沈淪苦趣一切衆生發菩提心行菩薩道但以三業六根多諸罪纍三障厚重菩提行願不得現前不能自利利人深自剋責今日奉請諸佛賢聖大悲觀世音菩薩摩訶薩等懺悔過去今生及未來世一切惡業三業六根三障三毒自有身來流浪六道處處受形內無慧眼外近惡人開放逸門造生死業枝條華葉遍滿三界二十五有無不受生輪環無際相續無窮偶得人身犯諸重戒一切諸犯輕重篇聚多有毀犯違逆十方三世諸佛清淨妙戒若不懺悔當墮阿鼻大地獄中畜生餓鬼阿修羅道天上人間受無量苦輪回六道無解脫期今日嚴淨道場誠心懺悔不敢覆藏唯願尊者觀世音菩薩摩訶薩顯現道場放勝光明照觸身心令得清淨一一戒根還得如故興隆三寶起護法心起護戒心起四攝心起慈忍心心如金剛願不更犯已犯之罪與法界衆生俱同懺悔盡未來際常得修習菩提行願生生常處淨佛國土三障永除絶三惡道永離衆苦成無上道虛空有盡我願無窮法性有邊願心無極盡入如來願性海中懺悔發願已歸命禮三寶第九禮拜百録云一心禮上所請三寶禮拜事儀理觀并運念偈等並如前禮竟如法行道或三或七旋繞時口稱南無佛南無法南無僧南無本師釋迦牟尼佛南無無量壽佛南無過去七佛南無十方諸佛南無觀世音菩薩南無大勢至菩薩南無十方一切菩薩摩訶薩或七稱或三稱當隨意補助儀云欲行道時更須正立想此道場猶如法界十方三寶畟塞虛空以次回身旋繞法座十方三寶心性寂滅影現十方心想如夢梵聲如響勿令心散旋竟三自歸依自歸於佛當願衆生體解大道發無上心説竟作禮復言自歸於法當願衆生深入經藏智慧如海説竟作禮復言自歸於僧當願衆生統理大衆一切無礙和南聖衆作禮第十誦經百録云令一人登高座唱誦請觀音經法華三昧云夫誦經之法當使文句分明音聲辨了不寬不急繫緣經中文句如對文不異不得謬誤次當靜心了音聲性空猶如谷響雖不得音聲而心歷歷照諸句義言辭辨了運此法音充滿法界供養三寶普施衆生令入大乘一實境界順此經意應令十種行人各得消伏毒害悉入大涅槃海百録云午前初夜施上方法餘坐禪禮佛依常法是為一日一夜規矩至第二乃至七七日亦復如是輔行云餘謂四時必依常儀不可廢也正意竟勸修第三止觀問曰上三三昧皆有勸修此何獨無答六蔽非道為解脫道若更勸修失旨逾甚今何特違止觀而立勸修也然隨自意凡約四法論修何妨勸善乎彼不勸之旨已在答文今別約依經方法經中佛自勸修豈關人情經云此陀羅尼名灌頂章句無上梵行必定吉祥大功德海衆生聞者獲大善利應當暗誦疏指此為勸修也一經備揚大悲施無畏者念佛三昧功德寶幢欲得現身見觀世音欲見釋迦無比色像欲於毛端見無數佛欲於現身見八十億諸佛皆來授手為得大悲無畏功德乃至現身發無忘旋陀羅尼一切善願皆得成就後生佛前長與苦別如是稱善令受持此呪滅三障者毗舍離人六根重病即得平復飢饉王難惡獸盜賊牢獄枷杻羅剎毒藥刀劍生難四百四病一時不起報也破梵行人作十惡業聞此呪時蕩除糞穢還得清淨過去業緣現造衆惡惡業惡行不善惡聚極重惡業斯那比丘往昔惡行殺生無量皆得消滅業也斷除三毒根成佛道無疑大火從四面來焚燒己身龍王降雨設火焚身節節疼痛三誦此呪即得除愈不被繫縛長貪欲瞋恚愚癡三毒等畏譬如猛風吹去重雲即得消伏煩惱也失國亡妻冤憎會苦三塗八難皆得解脫稱歎無盡又偈云一切惡人惡口者違逆此呪起不善現身白癩膿血流後墮地獄長夜苦是故應當慈心護受持讀誦灌頂句地獄清淨如蓮華餓鬼破碎無八難蓮華化生為父母心淨柔軟無塵垢嗚呼諸佛慈音如此稱讚誠實不虛願再讀再思勇發道意少切大報當須一一約十種行人乃至等覺生善滅惡明經力用廣如經説略勸修竟已上擬經三分歸向流布偈十方大悲海佛法賢聖僧護世觀世音能施無畏者我集吉祥句利益初心人唯願賜所加在所常流布
